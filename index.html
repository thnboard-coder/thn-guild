<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>THN Guild Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#080c14;}
#frame{width:100%;height:100%;border:none;display:block;}
#loading{position:fixed;inset:0;background:#080c14;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999;}
.logo{font-size:32px;}
.title{font-family:sans-serif;font-size:18px;font-weight:700;color:#e2e8f4;letter-spacing:2px;}
.title span{color:#3b82f6;}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;animation:dp .8s infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="loading">
  <div class="logo">⚔️</div>
  <div class="title"><span>THN</span> GUILD</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<iframe id="frame" onload="document.getElementById('loading').style.display='none'"></iframe>
<script>
var VAPID_KEY = 'BCGpoAX-PwnYqlxKzKiozihCw-GuPNOhpOh3bCeMXHYsKHxMjBjjnJvAP__nF1D-9GgsnS1L7zG3x_aEvOdgCHI';
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbza2304Du2b1bTOShyTilo8-4_f0pYwwjHyIeHb-gNwfHlY5akIZL7KG2q4ozocMCtU5A/exec';
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyC2II3ydXUE2CRJWtYTx5yf0W4kxT8qgrs",
  authDomain: "thn-guild.firebaseapp.com",
  projectId: "thn-guild",
  storageBucket: "thn-guild.firebasestorage.app",
  messagingSenderId: "130528607870",
  appId: "1:130528607870:web:c0d477110c5a183270e22f"
};

if('serviceWorker' in navigator && 'PushManager' in window){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./firebase-messaging-sw.js')
      .then(function(reg){
        loadFirebase(reg);
      })
      .catch(function(e){ console.log('SW error:', e); loadFrame(''); });
  });
} else {
  loadFrame('');
}

function loadFrame(token){
  var url = token ? APPS_SCRIPT_URL + '?fcm_token=' + encodeURIComponent(token) : APPS_SCRIPT_URL;
  document.getElementById('frame').src = url;
}

function loadFirebase(swReg){
  var s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
  s1.onload = function(){
    var s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js';
    s2.onload = function(){ initFCM(swReg); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

function initFCM(swReg){
  firebase.initializeApp(FIREBASE_CONFIG);
  var messaging = firebase.messaging();
  Notification.requestPermission().then(function(perm){
    if(perm !== 'granted'){ loadFrame(''); return; }
    messaging.getToken({vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg})
      .then(function(token){
        localStorage.setItem('thn_fcm_token', token||'');
        loadFrame(token||'');
      })
      .catch(function(e){ console.log('FCM error:', e); loadFrame(''); });
  });
  messaging.onMessage(function(payload){
    new Notification(payload.notification.title, {
      body: payload.notification.body,
      vibrate: [300,100,300]
    });
  });
}
</script>
</body>
</html>
